      '.print-body{ font-family:Consolas,"Courier New",monospace; font-size:13px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word; }' +
      '</style></head><body>' +
      '<div class="print-header"><p class="print-title">' + escapeHtml(title) + '</p>' +
      '<p class="print-date">' + dateStr + '</p></div>' +
      '<div class="print-body">' + escapeHtml(ta.value) + '</div>' +
      '</body></html>'
    );
    w.document.close(); w.focus();
    setTimeout(() => w.print(), 250); // da tiempo a aplicar los estilos antes de imprimir
  }

  function closeWindowOrTab(){ try{ window.close(); }catch(e){} }

  // ============ Edición ============
  async function doCopy(){
    const ta = activeTextarea(); if(!ta) return;
    const sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
    if(!sel) return;
    try{ await navigator.clipboard.writeText(sel); }catch(e){ document.execCommand('copy'); }
  }
  async function doCut(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const sel = ta.value.substring(start, end); if(!sel) return;
    try{ await navigator.clipboard.writeText(sel); }catch(e){}
    ta.setRangeText('', start, end, 'end'); refreshAll();
  }
  async function doPaste(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    let text = '';
    try{ text = await navigator.clipboard.readText(); }
    catch(e){ await alertModal('No se pudo leer el portapapeles. Usa Ctrl+V directamente sobre el editor.'); return; }
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.setRangeText(text, start, end, 'end'); refreshAll();
  }
  function doDelete(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    let start = ta.selectionStart, end = ta.selectionEnd;
    if(start === end) end = Math.min(ta.value.length, end + 1);
    ta.setRangeText('', start, end, 'end'); refreshAll();
  }
  function doUndo(){
    if(isLocked()) return;
    if(!activeTextarea()) return;
    document.execCommand('undo'); refreshAll();
  }
  function insertDateTime(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    const now = new Date().toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' });
    const pos = ta.selectionStart;
    ta.setRangeText(now, pos, ta.selectionEnd, 'end'); refreshAll();
  }
  function selectAllText(){ const ta = activeTextarea(); if(!ta) return; ta.focus(); ta.select(); }

  // ----- Buscar / Reemplazar -----
  function toggleFindBar(show){
    if(show && !activeTextarea()) return;
    findbar.classList.toggle('hidden', !show);
    if(show){ findInput.focus(); findInput.select(); }
    else { const ta = activeTextarea(); ta && ta.focus(); }
  }
  function toggleReplaceRow(show){ replaceRow.classList.toggle('hidden', !show); }
  function searchDir(forward){
    const ta = activeTextarea(); if(!ta) return;
    const term = findInput.value;
    findInput.classList.remove('notfound'); if(!term) return;
    const hay = ta.value.toLowerCase(); const needle = term.toLowerCase();
    let idx;
    if(forward){
      idx = hay.indexOf(needle, ta.selectionEnd);
      if(idx === -1) idx = hay.indexOf(needle, 0);
    } else {
      idx = hay.lastIndexOf(needle, Math.max(0, ta.selectionStart - 1));
      if(idx === -1) idx = hay.lastIndexOf(needle);
    }
    if(idx === -1){ findInput.classList.add('notfound'); return; }
    ta.focus(); ta.setSelectionRange(idx, idx + term.length); updateCursorStatus();
    ta.classList.remove('flash');
    void ta.offsetWidth; // fuerza reflow para poder reiniciar la animación si se repite seguido
    ta.classList.add('flash');
    setTimeout(() => ta.classList.remove('flash'), 500);
  }
  function replaceOne(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    const term = findInput.value; if(!term) return;
    let sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
    // Si lo que está seleccionado ahora mismo no es ya la coincidencia
    // (lo normal al apretar "Reemplazar" por primera vez), primero la busca.
    if(sel.toLowerCase() !== term.toLowerCase()){
      searchDir(true);
      sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
    }
    if(sel.toLowerCase() === term.toLowerCase()){
      const start = ta.selectionStart;
      ta.focus();
      document.execCommand('insertText', false, replaceInput.value); // así Ctrl+Z sí puede deshacerlo
      refreshAll();
      ta.setSelectionRange(start + replaceInput.value.length, start + replaceInput.value.length);
      searchDir(true); // deja lista la siguiente coincidencia para el próximo clic
    } else {
      showToast('No se encontró "' + term + '"');
    }
  }
  function replaceAll(){
    if(isLocked()){ showToast('Conecta una carpeta de guardado para poder escribir.'); return; }
    const ta = activeTextarea(); if(!ta) return;
    const term = findInput.value; if(!term) return;
    const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    const safeReplacement = replaceInput.value.replace(/\$/g, '$$$$'); // $ literal, no referencia de captura
    const before = ta.value;
    const after = before.replace(re, safeReplacement);
    if(after === before){ showToast('No se encontró "' + term + '"'); return; }
    ta.focus();
    ta.setSelectionRange(0, before.length);
    document.execCommand('insertText', false, after); // así Ctrl+Z sí puede deshacerlo
    refreshAll();
    showToast('Reemplazado en todas las coincidencias ✓ (Ctrl+Z para deshacer)');
  }

  function gotoLine(){
    if(!activeTextarea()) return;
    openModal(
      '<h3>Ir a la línea</h3><label>Número de línea</label><input type="number" id="gotoInput" min="1" value="1">' +
      '<div class="modal-actions"><button data-modal-cancel>Cancelar</button><button data-modal-ok>Ir</button></div>',
      function(){
        const ta = activeTextarea(); if(!ta) return;
        const n = Math.max(1, parseInt(document.getElementById('gotoInput').value, 10) || 1);
        const lines = ta.value.split('\n');
        let pos = 0;
        for(let i = 0; i < Math.min(n - 1, lines.length); i++) pos += lines[i].length + 1;
        ta.focus(); ta.setSelectionRange(pos, pos); updateCursorStatus();
      }
    );
  }

  // ============ Menú Fuente (familia + tamaño) ============
  const FONT_FAMILIES = {
    cascadia: { label: 'Cascadia Code', css: '"Cascadia Code","JetBrains Mono","Fira Code",ui-monospace,Consolas,"Courier New",monospace' },
    mono:     { label: 'Mono (JetBrains / Fira)', css: '"JetBrains Mono","Fira Code","Cascadia Code",ui-monospace,Consolas,"Courier New",monospace' },
    consolas: { label: 'Consolas', css: 'Consolas,"Courier New",monospace' },
    georgia:  { label: 'Georgia (serif)', css: 'Georgia,"Times New Roman",serif' },
    inter:    { label: 'Inter (sans)', css: 'Inter,-apple-system,"Segoe UI",sans-serif' }
  };
  const FONT_SIZES = [12, 13, 14, 15, 16, 18, 20, 24];
  let currentFontKey = 'consolas';

  function buildFontMenu(){
    const curSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--editor-font-size'), 10) || 18;
    let html = '<div class="mi-label">Familia</div>';
    Object.keys(FONT_FAMILIES).forEach(function(key){
      html += '<button class="mi" data-font-fam="' + key + '"><span class="check">' +
        (key === currentFontKey ? '✓' : '') + '</span><span style="font-family:' +
        FONT_FAMILIES[key].css.replace(/"/g,'&quot;') + ';">' + FONT_FAMILIES[key].label + '</span></button>';
    });
    html += '<div class="mi-sep"></div><div class="mi-label">Tamaño</div>';
    FONT_SIZES.forEach(function(s){
      html += '<button class="mi" data-font-size="' + s + '"><span class="check">' +
        (s === curSize ? '✓' : '') + '</span>' + s + ' px</button>';
    });
    fontMenuDropdown.innerHTML = html;
  }
  function setFontFamily(key){
    currentFontKey = key;
    document.documentElement.style.setProperty('--editor-font-family', FONT_FAMILIES[key].css);
    buildFontMenu();
  }
  function setFontSize(px){
    document.documentElement.style.setProperty('--editor-font-size', px + 'px');
    buildFontMenu();
  }
  fontMenuDropdown.addEventListener('click', function(e){
    const famBtn = e.target.closest('[data-font-fam]');
    if(famBtn){ setFontFamily(famBtn.getAttribute('data-font-fam')); closeAllMenus(); return; }
    const sizeBtn = e.target.closest('[data-font-size]');
    if(sizeBtn){ setFontSize(parseInt(sizeBtn.getAttribute('data-font-size'), 10)); closeAllMenus(); }
  });

  let modalOnCancel = null;
  let modalConfirmed = false;
  function openModal(html, onConfirm, onCancel){
    modalOnCancel = onCancel || null;
    modalConfirmed = false;
    modalBox.className = 'modal-box';
    modalBox.innerHTML = html;
    modalOverlay.classList.add('open');
    function tryConfirm(){
      const result = onConfirm();
      if(result && typeof result.then === 'function'){
        if(okBtn) okBtn.disabled = true;
        result.then(function(r){
          if(okBtn) okBtn.disabled = false;
          if(r !== false){ modalConfirmed = true; closeModal(); }
        }).catch(function(){ if(okBtn) okBtn.disabled = false; });
      } else if(result !== false){
        modalConfirmed = true;
        closeModal();
      }
    }
    const cancelBtn = modalBox.querySelector('[data-modal-cancel]');
    const okBtn = modalBox.querySelector('[data-modal-ok]');
    if(cancelBtn) cancelBtn.addEventListener('click', closeModal);
    if(okBtn) okBtn.addEventListener('click', tryConfirm);
    modalBox.addEventListener('keydown', function(e){
      if(e.key === 'Enter' && e.target.tagName !== 'SELECT' && okBtn){ e.preventDefault(); tryConfirm(); }
    });
    const firstInput = modalBox.querySelector('input, select');
    if(firstInput){
      firstInput.focus();
      if(firstInput.tagName === 'INPUT') firstInput.select();
    }
  }
  function closeModal(){
    modalOverlay.classList.remove('open');
    if(!modalConfirmed && modalOnCancel){ const fn = modalOnCancel; modalOnCancel = null; fn(); }
    modalOnCancel = null;
    const ta = activeTextarea(); ta && ta.focus();
  }
  modalOverlay.addEventListener('click', function(e){ if(e.target === modalOverlay) closeModal(); });

  // Reemplazo del confirm()/alert() nativos del navegador, con el mismo
  // estilo visual que el resto de los modales de la app.
  function confirmModal(message, opts){
    opts = opts || {};
    return new Promise(function(resolve){
      openModal(
        '<h3>' + escapeHtml(opts.title || 'Confirmar') + '</h3>' +
        '<p class="modal-text">' + escapeHtml(message) + '</p>' +
        '<div class="modal-actions"><button data-modal-cancel>' + escapeHtml(opts.cancelLabel || 'Cancelar') + '</button>' +
        '<button data-modal-ok' + (opts.danger ? ' class="modal-danger"' : '') + '>' + escapeHtml(opts.confirmLabel || 'Confirmar') + '</button></div>',
        function(){ resolve(true); return true; },
        function(){ resolve(false); }
      );
    });
  }
  function alertModal(message, opts){
    opts = opts || {};
    return new Promise(function(resolve){
      openModal(
        '<h3>' + escapeHtml(opts.title || 'Aviso') + '</h3>' +
        '<p class="modal-text">' + escapeHtml(message) + '</p>' +
        '<div class="modal-actions"><button data-modal-ok>' + escapeHtml(opts.okLabel || 'Entendido') + '</button></div>',
        function(){ resolve(); return true; },
        function(){ resolve(); }
      );
    });
  }

  function setTheme(name){
    document.documentElement.setAttribute('data-theme', name);
    const found = THEMES.find(p => p[0] === name);
    if(themeToggleBtn) themeToggleBtn.textContent = found ? found[1] : name;
  }
  function toggleTheme(){
    const current = document.documentElement.getAttribute('data-theme') || 'github-light';
    setTheme(current === 'github-light' ? 'github-dark' : 'github-light');
  }
  if(themeToggleBtn) themeToggleBtn.addEventListener('click', toggleTheme);

  function buildRecentMenu(){
    if(!supportsFSAccess){
      recentSubmenu.innerHTML = '<button class="mi disabled">No disponible en este navegador</button>';
      return;
    }
    if(recentFiles.length === 0){
      recentSubmenu.innerHTML = '<button class="mi disabled">No hay archivos recientes</button>';
      return;
    }
    recentSubmenu.innerHTML = '';
    recentFiles.forEach(function(r){
      const btn = document.createElement('button');
      btn.className = 'mi';
      btn.innerHTML = DOC_ICON_SVG + '<span>' + escapeHtml(r.name) + '</span>';
      btn.addEventListener('click', async function(){
        try{
          const file = await r.handle.getFile();
          const text = await file.text();
          createTab({ name: file.name, content: text, handle: r.handle });
        }catch(err){ await alertModal('No se pudo reabrir el archivo (puede que ya no exista o se movió).'); }
        closeAllMenus();
      });
      recentSubmenu.appendChild(btn);
    });
  }

  // ============ Menú: apertura / cierre ============
  const menuEls = Array.from(document.querySelectorAll('.menubar > .menu'));
  const mobileBackdrop = document.getElementById('mobileBackdrop');
  function syncMobileOverlay(){
    const anyMenuOpen = menuEls.some(m => m.classList.contains('open'));
    document.body.classList.toggle('mobile-overlay-open', anyMenuOpen || notesPanelOpen);
  }
  mobileBackdrop.addEventListener('click', function(){
    closeAllMenus();
  });
  function refreshMenuContent(menuEl){
    if(menuEl.dataset.menu === 'file') buildRecentMenu();
    if(menuEl.dataset.menu === 'font') buildFontMenu();
  }
  menuEls.forEach(function(menuEl){
    const btn = menuEl.querySelector('.menu-btn');
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const willOpen = !menuEl.classList.contains('open');
      closeAllMenus();
      if(willOpen){
        menuEl.classList.add('open');
        refreshMenuContent(menuEl);
      }
      syncMobileOverlay();
    });
    btn.addEventListener('mouseenter', function(){
      if(menuEls.some(m => m.classList.contains('open')) && !menuEl.classList.contains('open')){
        closeAllMenus(); menuEl.classList.add('open');
        refreshMenuContent(menuEl);
        syncMobileOverlay();
      }
    });
  });
  document.querySelectorAll('.submenuwrap').forEach(function(wrap){
    const trigger = wrap.querySelector('.mi.has-sub');
    if(!trigger) return;
    trigger.addEventListener('click', function(e){
      e.stopPropagation();
      if(wrap.classList.contains('disabled')) return;
      document.querySelectorAll('.submenuwrap').forEach(w => { if(w !== wrap) w.classList.remove('open'); });
      wrap.classList.toggle('open');
    });
    trigger.addEventListener('mouseenter', function(){
      if(wrap.classList.contains('disabled')) return;
      document.querySelectorAll('.submenuwrap').forEach(w => { if(w !== wrap) w.classList.remove('open'); });
      wrap.classList.add('open');
    });
  });
  function closeAllMenus(){
    menuEls.forEach(m => m.classList.remove('open'));
    document.querySelectorAll('.submenuwrap').forEach(w => w.classList.remove('open'));
    syncMobileOverlay();
  }
  document.addEventListener('click', function(e){
    if(!e.target.closest('.menubar')) closeAllMenus();
  });

  // ============ despacho de acciones del menú ============
  // ============================================================
  // MARKDOWN: renderizador puro JS, sin dependencias externas
  // ============================================================
  function renderMarkdown(md){
    let html = md;
    // Escapar caracteres HTML excepto los que usamos a continuación
    function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Bloques de código cercados (``` ... ```)
    const codeBlocks = [];
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,lang,code){
      const i = codeBlocks.length;
      codeBlocks.push('<pre><code class="lang-'+esc(lang)+'">'+esc(code.replace(/^\n/,'').replace(/\n$/,''))+'</code></pre>');
      return '\x00CODE'+i+'\x00';
    });
    // Código inline
    const inlineCodes = [];
    html = html.replace(/`([^`]+)`/g, function(_,code){
      const i = inlineCodes.length;
      inlineCodes.push('<code>'+esc(code)+'</code>');
      return '\x00IC'+i+'\x00';
    });

    // Imágenes  ![alt](src)
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(_,alt,src){
      return '<img src="'+src+'" alt="'+esc(alt)+'" loading="lazy">';
    });
    // Links [text](url)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Encabezados
    html = html.replace(/^######\s(.+)$/gm,'<h6>$1</h6>');
    html = html.replace(/^#####\s(.+)$/gm,'<h5>$1</h5>');
    html = html.replace(/^####\s(.+)$/gm,'<h4>$1</h4>');
    html = html.replace(/^###\s(.+)$/gm,'<h3>$1</h3>');
    html = html.replace(/^##\s(.+)$/gm,'<h2>$1</h2>');
    html = html.replace(/^#\s(.+)$/gm,'<h1>$1</h1>');

    // HR
    html = html.replace(/^---+$/gm,'<hr>');
    html = html.replace(/^\*\*\*+$/gm,'<hr>');

    // Negrita, cursiva, tachado
    html = html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    html = html.replace(/__(.+?)__/g,'<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g,'<em>$1</em>');
    html = html.replace(/_(.+?)_/g,'<em>$1</em>');
    html = html.replace(/~~(.+?)~~/g,'<del>$1</del>');

    // Blockquotes
    html = html.replace(/^>\s?(.*)$/gm,'<blockquote>$1</blockquote>');
    html = html.replace(/<\/blockquote>\n<blockquote>/g,'\n');

    // Tablas (simple)
    html = html.replace(/((?:^\|.+\|\n?)+)/gm, function(block){
      const rows = block.trim().split('\n');
      if(rows.length < 2) return block;
      const isSep = rows[1].replace(/\|/g,'').trim().match(/^[-: ]+$/);
      if(!isSep) return block;
      const header = rows[0].split('|').filter((_,i,a) => i>0 && i<a.length-1).map(c=>'<th>'+c.trim()+'</th>').join('');
      const body = rows.slice(2).map(r => {
        const cells = r.split('|').filter((_,i,a) => i>0 && i<a.length-1).map(c=>'<td>'+c.trim()+'</td>').join('');
        return '<tr>'+cells+'</tr>';
      }).join('');
      return '<table><thead><tr>'+header+'</tr></thead><tbody>'+body+'</tbody></table>';
    });

    // Listas de tareas
    html = html.replace(/^- \[x\] (.+)$/gim,'<li class="task-item"><input type="checkbox" checked disabled> $1</li>');
    html = html.replace(/^- \[ \] (.+)$/gim,'<li class="task-item"><input type="checkbox" disabled> $1</li>');
    // Listas desordenadas
    html = html.replace(/^[-*+]\s(.+)$/gm,'<li>$1</li>');
    html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g,'<ul>$1</ul>');
    // Listas ordenadas
    html = html.replace(/^\d+\.\s(.+)$/gm,'<oli>$1</oli>');
    html = html.replace(/(<oli>[\s\S]+?<\/oli>)(?!\s*<oli>)/g, s => '<ol>'+s.replace(/<\/?oli>/g, m => m==='<oli>'?'<li>':'</li>')+'</ol>');

    // Párrafos: líneas que no son bloques HTML
    html = html.replace(/^(?!<[a-zA-Z\/]|$)(.+)$/gm,'<p>$1</p>');

    // Restaurar bloques de código e inline code
    inlineCodes.forEach((c,i) => { html = html.replace('\x00IC'+i+'\x00', c); });
    codeBlocks.forEach((c,i) => { html = html.replace('\x00CODE'+i+'\x00', c); });

    return html;
  }

  function togglePreview(tab){
    if(!tab) tab = activeTab();
    if(!tab) return;
    tab.previewMode = !tab.previewMode;
    if(tab.previewMode){
      tab.preview.innerHTML = renderMarkdown(tab.ta.value);
      tab.ta.classList.remove('active');
      tab.preview.classList.add('active');
    } else {
      tab.preview.classList.remove('active');
      tab.ta.classList.add('active');
      tab.ta.focus();
    }
  }

  // Aplica formato Markdown en el punto de inserción (o alrededor de la selección)
  function applyMdFormat(ta, cmd){
    if(isLocked()) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const sel = ta.value.substring(start, end);
    const line = ta.value.lastIndexOf('\n', start-1)+1;
    let insert='', newStart=start, newEnd=end;
    const WRAP = {
      bold:      { pre:'**',  post:'**',  def:'texto en negrita' },
      italic:    { pre:'*',   post:'*',   def:'texto en cursiva' },
      strike:    { pre:'~~',  post:'~~',  def:'texto tachado'    },
      code:      { pre:'`',   post:'`',   def:'código'           },
    };
    if(WRAP[cmd]){
      const {pre,post,def} = WRAP[cmd];
      const txt = sel || def;
      insert = pre+txt+post;
      ta.setRangeText(insert, start, end, 'end');
      ta.setSelectionRange(start+pre.length, start+pre.length+txt.length);
      refreshAll(); return;
    }
    const LINE_PRE = {
      h1:'# ', h2:'## ', h3:'### ', ul:'- ', ol:'1. ', task:'- [ ] ', quote:'> '
    };
    if(LINE_PRE[cmd]){
      const pre = LINE_PRE[cmd];
      const curLine = ta.value.substring(line, end);
      const already = curLine.startsWith(pre);
      const replacement = already
        ? ta.value.substring(line).replace(pre, '')
        : pre + ta.value.substring(line);
      ta.value = ta.value.substring(0, line) + replacement;
      ta.setSelectionRange(line + pre.length, line + pre.length);
      refreshAll(); return;
    }
    if(cmd === 'codeblock'){
      insert = '\n```\n'+(sel||'código aquí')+'\n```\n';
      ta.setRangeText(insert, start, end, 'end');
      refreshAll(); return;
    }
    if(cmd === 'hr'){
      ta.setRangeText('\n---\n', start, end, 'end');
      refreshAll(); return;
    }
    if(cmd === 'link'){
      const txt = sel || 'texto del enlace';
      insert = '['+txt+'](url)';
      ta.setRangeText(insert, start, end, 'end');
      ta.setSelectionRange(start+txt.length+3, start+insert.length-1);
      refreshAll(); return;
    }
  }

  // Convierte un File de imagen a base64 y lo inserta como sintaxis Markdown
  const ACTIONS = {
    newTab, newWindow, open: openFile,
    save: () => saveTab(activeTab()), saveAs: () => saveTabAs(activeTab()), saveAll: saveAllTabs,
    chooseFolder: chooseSaveFolder,
    print: printActive, closeTab: () => closeTab(activeTabId), closeWindow: closeWindowOrTab, exitApp: closeWindowOrTab,
    undo: doUndo, cut: doCut, copy: doCopy, paste: doPaste, delete: doDelete,
    find: () => toggleFindBar(true), findNext: () => searchDir(true), findPrev: () => searchDir(false),
    searchAll: searchAllNotes,
    replace: () => { toggleFindBar(true); toggleReplaceRow(true); }, goto: gotoLine,
    selectAll: selectAllText, dateTime: insertDateTime
  };
  document.querySelectorAll('.mi[data-action]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      const action = btn.getAttribute('data-action');
      const fn = ACTIONS[action];
      if(fn) fn();
      closeAllMenus();
    });
  });

  // ============ atajos de teclado globales ============
  window.addEventListener('keydown', function(e){
    const ctrl = e.ctrlKey || e.metaKey;
    const key = e.key.toLowerCase();
    if(ctrl && key === 'n' && !e.shiftKey){ e.preventDefault(); newTab(); }
    else if(ctrl && e.shiftKey && key === 'n'){ e.preventDefault(); newWindow(); }
    else if(ctrl && key === 'o'){ e.preventDefault(); openFile(); }
    else if(ctrl && key === 's' && !e.shiftKey && !e.altKey){ e.preventDefault(); saveTab(activeTab()); }
    else if(ctrl && e.shiftKey && key === 's'){ e.preventDefault(); saveTabAs(activeTab()); }
    else if(ctrl && e.altKey && key === 's'){ e.preventDefault(); saveAllTabs(); }
    else if(ctrl && key === 'p'){ e.preventDefault(); printActive(); }
    else if(ctrl && key === 'w' && !e.shiftKey){ e.preventDefault(); closeTab(activeTabId); }
    else if(ctrl && e.shiftKey && key === 'w'){ e.preventDefault(); closeWindowOrTab(); }
    else if(ctrl && key === 'f'){ e.preventDefault(); toggleFindBar(true); }
    else if(key === 'f3' && !e.shiftKey){ e.preventDefault(); searchDir(true); }
    else if(e.shiftKey && key === 'f3'){ e.preventDefault(); searchDir(false); }
    else if(ctrl && key === 'h'){ e.preventDefault(); toggleFindBar(true); toggleReplaceRow(true); }
    else if(ctrl && key === 'g'){ e.preventDefault(); gotoLine(); }
    else if(key === 'f5'){ e.preventDefault(); insertDateTime(); }
    else if(ctrl && e.shiftKey && key === 'p'){ e.preventDefault(); togglePreview(activeTab()); }
    else if(ctrl && key === 'b' && !e.shiftKey){ const t=activeTab(); if(t&&!t.previewMode){ e.preventDefault(); applyMdFormat(t.ta,'bold'); } }
    else if(ctrl && key === 'i' && !e.shiftKey){ const t=activeTab(); if(t&&!t.previewMode){ e.preventDefault(); applyMdFormat(t.ta,'italic'); } }
    else if(ctrl && key === 'tab'){ e.preventDefault(); cycleTab(e.shiftKey ? -1 : 1); }
    else if(key === 'escape'){ closeAllMenus(); toggleFindBar(false); closeModal(); }
  });
  function cycleTab(dir){
    if(tabs.length < 2) return;
    const idx = tabs.findIndex(t => t.id === activeTabId);
    const next = (idx + dir + tabs.length) % tabs.length;
    activateTab(tabs[next].id);
  }

  findInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); searchDir(true); }
    if(e.key === 'Escape'){ toggleFindBar(false); }
  });
  document.getElementById('findNextBtn').addEventListener('click', () => searchDir(true));
  document.getElementById('findPrevBtn').addEventListener('click', () => searchDir(false));
  document.getElementById('findCloseBtn').addEventListener('click', () => toggleFindBar(false));
  document.getElementById('toggleReplaceBtn').addEventListener('click', () => toggleReplaceRow(replaceRow.classList.contains('hidden')));
  document.getElementById('replaceOneBtn').addEventListener('click', replaceOne);
  document.getElementById('replaceAllBtn').addEventListener('click', replaceAll);

  window.addEventListener('beforeunload', function(e){
    if(tabs.some(isDirty)){ e.preventDefault(); e.returnValue = ''; }
  });

  // ============ Botón flotante de guardado rápido ============
  quickSaveBtn.addEventListener('click', () => saveTab(activeTab()));
  function syncQuickSave(){
    const t = activeTab();
    const dirty = t ? isDirty(t) : false;
    quickSaveBtn.classList.toggle('dirty', dirty);
    quickSaveBtn.classList.toggle('clean', !dirty);
  }

  // ============ estado inicial ============
  document.getElementById('copyYear').textContent = new Date().getFullYear();
  document.getElementById('editorEmptyNewBtn').addEventListener('click', newTab);
  refreshAll();
  syncFolderStatus();
  restoreSaveFolder();
  restoreRecentFiles();
})();
