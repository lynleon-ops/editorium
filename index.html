<!DOCTYPE html>
<html lang="es" data-theme="github-light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorium 6.8</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23166534'/%3E%3Cpath d='M7 8h12v3H7zM7 14h18v3H7zM7 20h14v3H7z' fill='%234ade80'/%3E%3Ccircle cx='24' cy='8.5' r='3.5' fill='%234ade80'/%3E%3C/svg%3E">
<style>
  :root{
    --editor-font-size:18px;
    --editor-font-family:Consolas,"Courier New",monospace;
    --save-alert:#ff8c00;
    --selection-bg:#ffd400;
    --selection-fg:#1a1a1a;
    --danger:#e5484d;
    /* GitHub Light (default) */
    --bg-main:#ffffff; --bg-toolbar:#f6f8fa; --bg-gutter:#f6f8fa; --bg-page:#c9d1d9;
    --fg-text:#1f2328; --fg-muted:#59636e; --accent:#0969da; --accent2:#cf222e;
    --border:#d0d7de; --selection:#b6e3ff; --caret:#0969da;
  }
  html[data-theme="github-light"]{
    --bg-main:#ffffff; --bg-toolbar:#f6f8fa; --bg-gutter:#f6f8fa; --bg-page:#c9d1d9;
    --fg-text:#1f2328; --fg-muted:#59636e; --accent:#0969da; --accent2:#cf222e;
    --border:#d0d7de; --selection:#b6e3ff; --caret:#0969da;
  }
  html[data-theme="github-dark"]{
    --bg-main:#0d1117; --bg-toolbar:#161b22; --bg-gutter:#161b22; --bg-page:#010409;
    --fg-text:#e6edf3; --fg-muted:#7d8590; --accent:#2f81f7; --accent2:#ff7b72;
    --border:#30363d; --selection:#264f78; --caret:#2f81f7;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    display:flex;justify-content:center;height:100vh;overflow:hidden;
    background:var(--bg-page);color:var(--fg-text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    padding:0 16px 22px 16px;transition:background .2s;
  }
  button, select, input{font-family:inherit;}
  button:focus-visible, select:focus-visible, input:focus-visible{
    outline:2px solid var(--accent); outline-offset:1px;
  }

  /* ---------- Recuadro boxed de la app (máx. 1000px) ---------- */
  .app-shell{
    width:100%;max-width:1360px;display:flex;flex-direction:column;min-height:0;
    position:relative;
    background:var(--bg-main);border:1px solid var(--border);border-radius:0;
    box-shadow:0 30px 70px rgba(0,0,0,.5);overflow:hidden;
  }

  /* ---------- Botón de guardado (mismo estilo que el resto de botones del menú) ---------- */
  .saveBtn{
    background:transparent;border:none;color:var(--fg-text);
    cursor:pointer;border-radius:0;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;padding:9px 17px 8px;min-width:62px;font-weight:600;
    font-size:.66rem;text-transform:uppercase;letter-spacing:.03em;
  }
  .saveBtn svg{flex-shrink:0;}
  .saveBtn:hover{background:var(--border);}
  .saveBtn.dirty{background:var(--save-alert);color:#1a1a1a;}
  .saveBtn.dirty:hover{opacity:.85;}

  /* ---------- Aviso flotante (toast) ---------- */
  .toast{
    position:absolute;top:54px;left:50%;
    transform:translateX(-50%) translateY(-8px);
    background:var(--bg-toolbar);border:1px solid var(--border);color:var(--fg-text);
    padding:7px 16px;border-radius:0;font-size:.78rem;
    box-shadow:0 10px 28px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:90;
    display:flex;align-items:center;gap:12px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .toastUndoBtn{
    background:var(--accent);color:var(--bg-main);border:none;border-radius:0;
    padding:3px 10px;font-size:.74rem;cursor:pointer;font-weight:600;flex-shrink:0;
  }
  .toastUndoBtn.hidden{display:none;}

  /* ---------- Aviso para reconectar la carpeta de guardado ---------- */
  .reconnectBar{
    display:none;align-items:center;gap:10px;background:var(--bg-gutter);
    border-bottom:1px solid var(--border);padding:6px 14px;font-size:.78rem;color:var(--fg-text);
  }
  .reconnectBar.show{display:flex;}
  .reconnectBar button{
    background:var(--accent);color:var(--bg-main);border:none;border-radius:0;
    padding:4px 10px;font-size:.76rem;cursor:pointer;font-weight:600;
  }
  .reconnectBar .dismiss{
    margin-left:auto;background:transparent;color:var(--fg-muted);border:none;cursor:pointer;font-size:.9rem;
  }

  #folderStatus.active{color:var(--accent);}
  #folderStatus.pending{color:var(--save-alert);cursor:pointer;text-decoration:underline;}
  #folderStatus.none{color:var(--fg-muted);}
  #locationWarning{color:var(--save-alert);}

  /* ---------- Pestañas ---------- */
  .tabsbar{
    display:flex;align-items:stretch;background:var(--bg-toolbar);
    border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;
  }
  .tabsbar::-webkit-scrollbar{height:0;}
  .tabpill{
    display:flex;align-items:center;gap:7px;padding:7px 10px 7px 12px;
    border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;
    font-size:.78rem;color:var(--fg-muted);max-width:200px;flex-shrink:0;
  }
  .tabpill.active{background:var(--bg-main);color:var(--fg-text);}
  .tabpill .ficon{width:8px;height:8px;border-radius:0;background:var(--fg-muted);flex-shrink:0;}
  .tabpill.active .ficon{background:var(--accent);}
  .tabpill .tname{overflow:hidden;text-overflow:ellipsis;}
  .tabpill .dirty{color:var(--accent2);}
  .tabpill .tclose{
    color:var(--fg-muted);border:none;background:transparent;cursor:pointer;
    padding:2px 4px;border-radius:0;font-size:.85rem;line-height:1;
  }
  .tabpill .tclose:hover{background:var(--border);color:var(--fg-text);}
  .tabAdd{
    border:none;background:transparent;color:var(--fg-muted);cursor:pointer;
    padding:0 14px;font-size:.95rem;flex-shrink:0;
  }
  .tabAdd:hover{color:var(--accent);}

  /* ---------- Barra de menús ---------- */
  .menubar{
    display:flex;align-items:stretch;background:var(--bg-toolbar);
    border-bottom:1px solid var(--border);flex-shrink:0;padding:0 4px;
  }
  .menu{position:relative;}
  .menu-btn{
    background:transparent;border:none;color:var(--fg-text);
    cursor:pointer;border-radius:0;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;padding:9px 17px 8px;min-width:62px;
    font-size:.66rem;text-transform:uppercase;letter-spacing:.03em;font-weight:600;
  }
  .menu-btn svg{flex-shrink:0;}
  .menu-btn:hover{background:var(--border);}
  .menu.open > .menu-btn{background:var(--border);}
  .menubar-sep{
    width:1px;align-self:stretch;background:var(--border);
    margin:8px 1px;flex-shrink:0;
  }
  .menubar-sep.push{margin-left:auto;}
  .menu-dropdown{
    display:none;position:absolute;top:100%;left:0;
    background:var(--bg-toolbar);border:1px solid var(--border);border-radius:0;
    min-width:235px;box-shadow:0 12px 30px rgba(0,0,0,.5);padding:4px;z-index:60;
  }
  .menu-dropdown.dd-right{left:auto;right:0;}
  .mi-label{
    padding:6px 9px 2px;font-size:.68rem;color:var(--fg-muted);
    text-transform:uppercase;letter-spacing:.04em;
  }
  .menu.open > .menu-dropdown{display:block;}
  .mi{
    display:flex;justify-content:flex-start;align-items:center;gap:10px;
    width:100%;background:transparent;border:none;color:var(--fg-text);
    padding:7px 9px;font-size:.78rem;text-align:left;cursor:pointer;border-radius:0;
  }
  .mi .check{width:13px;display:inline-block;color:var(--accent);flex-shrink:0;}
  .mi .mi-icon{width:16px;height:16px;flex-shrink:0;opacity:.82;}
  .mi:hover:not(.disabled) .mi-icon{opacity:1;}
  .mi.disabled .mi-icon{opacity:.4;}
  .mi:hover:not(.disabled){background:var(--accent);color:var(--bg-main);}
  .mi:hover:not(.disabled) .check{color:var(--bg-main);}
  .mi.disabled{color:var(--fg-muted);cursor:default;}
  .mi .kbd{color:var(--fg-muted);font-size:.7rem;margin-left:auto;}
  .mi:hover:not(.disabled) .kbd{color:var(--bg-main);opacity:.75;}
  .theme-swatch{
    width:14px;height:14px;border-radius:3px;flex-shrink:0;
    border:1px solid rgba(0,0,0,.2);
  }
  .mi-sep{height:1px;background:var(--border);margin:4px 3px;}
  .submenuwrap{position:relative;}
  .submenuwrap > .menu-dropdown.submenu{top:-4px;left:100%;min-width:200px;}
  .submenuwrap.open > .submenu{display:block;}
  .submenuwrap.disabled > .mi{color:var(--fg-muted);cursor:default;}
  .submenuwrap.disabled > .mi:hover{background:transparent;color:var(--fg-muted);}

  /* ---------- Panel de todas mis notas ---------- */
  .notesPanel{
    width:240px;flex-shrink:0;
    background:#f8f9fa;border-right:1px solid var(--border);
    display:flex;flex-direction:column;
  }
  .notesPanel-inner{width:240px;height:100%;overflow-y:auto;padding:14px 12px;}

  /* Nombre de la app arriba del panel */
  .notesPanel-appName{
    font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--fg-muted);padding:0 2px 12px;
  }

  /* Botón nueva nota — grande, uppercase, prominente */
  .notesPanel-newBtn{
    display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    background:var(--bg-main);border:1.5px solid var(--border);border-radius:8px;
    color:var(--fg-text);padding:11px 14px;font-size:.78rem;font-weight:700;
    cursor:pointer;margin-bottom:18px;letter-spacing:.05em;text-transform:uppercase;
    box-shadow:0 1px 4px rgba(0,0,0,.08);transition:border-color .15s,box-shadow .15s;
  }
  .notesPanel-newBtn svg{flex-shrink:0;}
  .notesPanel-newBtn:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.14);}

  /* Cabecera "MIS NOTAS" + lupa en línea */
  .notesPanel-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2px 8px;
  }
  .notesPanel-headerLabel{
    font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--fg-muted);
  }
  .notesPanel-searchBtn{
    background:transparent;border:none;color:var(--fg-muted);cursor:pointer;
    padding:3px;border-radius:4px;line-height:0;
  }
  .notesPanel-searchBtn:hover{color:var(--accent);background:rgba(127,127,127,.12);}

  /* Fila de ordenamiento: FECHA + A-Z */
  .notesPanel-sortRow{display:flex;gap:6px;margin-bottom:14px;}
  .notesPanel-sortBtn{
    flex:1;background:transparent;border:1.5px solid var(--border);border-radius:2px;
    color:var(--fg-muted);font-size:.66rem;padding:5px 8px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.04em;font-weight:700;
    transition:all .12s;
  }
  .notesPanel-sortBtn:hover{border-color:var(--accent);color:var(--accent);}
  .notesPanel-sortBtn.active{
    background:var(--accent);border-color:var(--accent);
    color:#ffffff;box-shadow:0 1px 4px rgba(0,0,0,.18);
  }

  /* Cards de nota */
  .notesPanel-card{
    background:var(--bg-main);border:1px solid var(--border);border-radius:8px;
    padding:11px 13px;margin-bottom:8px;cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.07);transition:box-shadow .15s,border-color .15s;
  }
  .notesPanel-card:hover{border-color:var(--accent);box-shadow:0 3px 10px rgba(0,0,0,.12);}
  .notesPanel-card.active{border-color:var(--accent);}
  .notesPanel-cardTop{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .notesPanel-cardTitle{
    font-size:.88rem;font-weight:700;color:var(--fg-text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3;
  }
  .notesPanel-cardSub{
    font-size:.67rem;color:var(--fg-muted);margin-top:4px;
  }
  .notesPanel-trashBtn{
    background:transparent;border:none;color:var(--fg-muted);cursor:pointer;
    padding:3px;flex-shrink:0;border-radius:4px;line-height:0;opacity:.6;
  }
  .notesPanel-trashBtn:hover{color:var(--danger);background:rgba(229,72,77,.10);opacity:1;}

  .notesPanel-empty{color:var(--fg-muted);font-size:.78rem;padding:7px 2px;line-height:1.6;}
  .notesPanel-empty button{
    margin-top:8px;background:var(--accent);color:var(--bg-main);border:none;border-radius:6px;
    padding:8px 10px;font-size:.76rem;cursor:pointer;width:100%;font-weight:600;
  }

  /* ---------- Aviso de edición bloqueada (sin carpeta conectada) ---------- */
  .connectBar{
    display:none;align-items:center;gap:10px;background:var(--bg-gutter);
    border-bottom:1px solid var(--border);padding:6px 14px;font-size:.78rem;color:var(--fg-text);
  }
  .connectBar.show{display:flex;}
  .connectBar button{
    background:var(--accent);color:var(--bg-main);border:none;border-radius:0;
    padding:4px 10px;font-size:.76rem;cursor:pointer;font-weight:600;
  }

  /* ---------- Área de edición (ancho fijo de ~1100px) ---------- */
  .workspace{flex:1;display:flex;min-height:0;}
  .editorstack{flex:1;min-width:0;position:relative;}
  .editorEmpty{
    display:none;height:100%;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;color:var(--fg-muted);text-align:center;padding:40px;
  }
  .editorEmpty.show{display:flex;}
  .editorEmpty-icon{opacity:.45;}
  .editorEmpty p{margin:0;font-size:.88rem;}
  .editorEmpty button{
    background:var(--accent);color:var(--bg-main);border:none;border-radius:8px;
    padding:8px 18px;font-size:.82rem;cursor:pointer;font-weight:600;
  }
  textarea.editor{
    display:none;
    width:1100px;max-width:100%;height:100%;margin:0 auto;
    background:var(--bg-main);color:#000000;border:none;outline:none;
    resize:none;padding:16px 22px;font-size:var(--editor-font-size);line-height:1.5;tab-size:4;
    font-family:var(--editor-font-family);
    caret-color:var(--caret);white-space:pre-wrap;overflow-y:auto;overflow-x:hidden;
  }
  textarea.editor.active{display:block;}
  textarea.editor::selection{background:var(--selection-bg);color:var(--selection-fg);}
  textarea.editor::-webkit-scrollbar{width:11px;height:11px;}
  textarea.editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:0;}
  textarea.editor::-webkit-scrollbar-track{background:var(--bg-main);}
  @keyframes searchFlash{
    0%{box-shadow:inset 0 0 0 3px var(--selection-bg);}
    100%{box-shadow:inset 0 0 0 3px transparent;}
  }
  textarea.editor.flash{animation:searchFlash .5s ease-out;}
  textarea.editor::placeholder{color:var(--fg-muted);}

  /* ---------- Wrapper por pestaña (agrupa toolbar + editor/preview) ---------- */
  .tab-wrapper{
    display:none;flex-direction:column;width:100%;height:100%;position:relative;
  }
  .tab-wrapper.active{ display:flex; }

  /* ---------- Pane de preview Markdown ---------- */
  .preview-pane{
    display:none;width:1100px;max-width:100%;height:100%;margin:0 auto;
    padding:24px 32px;overflow-y:auto;background:var(--bg-main);color:var(--fg-text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    font-size:16px;line-height:1.75;
  }
  .preview-pane::-webkit-scrollbar{width:11px;}
  .preview-pane::-webkit-scrollbar-thumb{background:var(--border);}
  .preview-pane::-webkit-scrollbar-track{background:var(--bg-main);}
  .preview-pane.active{ display:block; }

  /* Tipografía del preview */
  .preview-pane h1{font-size:2rem;font-weight:700;margin:0 0 .6em;border-bottom:2px solid var(--border);padding-bottom:.3em;color:var(--fg-text);}
  .preview-pane h2{font-size:1.5rem;font-weight:700;margin:1.4em 0 .5em;border-bottom:1px solid var(--border);padding-bottom:.25em;color:var(--fg-text);}
  .preview-pane h3{font-size:1.2rem;font-weight:700;margin:1.2em 0 .4em;color:var(--fg-text);}
  .preview-pane h4,h5,h6{font-weight:700;margin:1em 0 .4em;color:var(--fg-text);}
  .preview-pane p{margin:0 0 1em;}
  .preview-pane strong{font-weight:700;}
  .preview-pane em{font-style:italic;}
  .preview-pane del{text-decoration:line-through;opacity:.7;}
  .preview-pane a{color:var(--accent);text-decoration:underline;}
  .preview-pane blockquote{
    margin:1em 0;padding:.6em 1em;
    border-left:4px solid var(--accent);
    background:var(--bg-gutter);color:var(--fg-muted);font-style:italic;
  }
  .preview-pane code{
    background:var(--bg-gutter);color:var(--accent2);
    font-family:var(--editor-font-family);font-size:.88em;
    padding:.15em .4em;border-radius:3px;
  }
  .preview-pane pre{
    background:var(--bg-gutter);border:1px solid var(--border);
    padding:1em;border-radius:4px;overflow-x:auto;margin:1em 0;
  }
  .preview-pane pre code{background:none;padding:0;font-size:.9em;color:var(--fg-text);}
  .preview-pane ul,.preview-pane ol{margin:.5em 0 1em 1.5em;padding:0;}
  .preview-pane li{margin:.25em 0;}
  .preview-pane hr{border:none;border-top:2px solid var(--border);margin:1.5em 0;}
  .preview-pane table{border-collapse:collapse;width:100%;margin:1em 0;}
  .preview-pane th,.preview-pane td{border:1px solid var(--border);padding:.5em .8em;text-align:left;}
  .preview-pane th{background:var(--bg-gutter);font-weight:700;}
  .preview-pane img{max-width:100%;height:auto;border-radius:4px;display:block;margin:.5em 0;}
  .preview-pane .task-item{list-style:none;margin-left:-1.2em;}
  .preview-pane .task-item input{margin-right:.5em;}



  /* ---------- Buscar / Reemplazar ---------- */
  .findbar{
    display:flex;flex-direction:column;gap:5px;padding:6px 10px;
    background:var(--bg-toolbar);border-top:1px solid var(--border);flex-shrink:0;
  }
  .findbar.hidden{display:none;}
  .findrow{display:flex;align-items:center;gap:6px;}
  .findbar input{
    flex:0 1 240px;background:var(--bg-main);color:var(--fg-text);
    border:1px solid var(--border);border-radius:0;padding:5px 8px;font-size:.8rem;
  }
  .findbar input.notfound{border-color:var(--accent2);}
  .findbar button{
    background:transparent;border:1px solid var(--border);color:var(--fg-text);
    padding:5px 10px;border-radius:0;font-size:.76rem;cursor:pointer;
  }
  .findbar button:hover{background:var(--border);}
  .findbar .findclose{margin-left:auto;color:var(--fg-muted);border:none;font-size:1rem;}
  .replacerow.hidden{display:none;}

  /* ---------- Barra de estado ---------- */
  .statusbar{
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;
    background:var(--bg-toolbar);border-top:1px solid var(--border);
    padding:6px 14px;font-size:.74rem;color:var(--fg-muted);flex-shrink:0;
    font-family:var(--editor-font-family);row-gap:4px;
  }
  .statusbar .left, .statusbar .right span{white-space:nowrap;}
  .statusbar .right{display:flex;flex-wrap:wrap;gap:6px 16px;row-gap:4px;justify-content:flex-end;}

  @media (max-width:640px){
    .statusbar{font-size:.7rem;padding:6px 10px;}
    .statusbar .right{display:none;}
  }

  .appFooter{
    text-align:left;background:var(--bg-page);color:var(--fg-muted);
    padding:16px 16px;font-size:.7rem;
    font-family:var(--editor-font-family);flex-shrink:0;
  }

  /* ---------- Modal genérico ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;
    align-items:center;justify-content:center;z-index:100;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--bg-toolbar);border:1px solid var(--border);border-radius:0;
    padding:18px 20px;min-width:280px;box-shadow:0 18px 50px rgba(0,0,0,.55);
    font-size:.85rem;color:var(--fg-text);
  }
  .modal-box h3{margin:0 0 12px 0;font-size:.95rem;color:var(--accent);}
  .modal-text{margin:0 0 4px;font-size:.85rem;line-height:1.5;color:var(--fg-text);}
  .modal-error{color:var(--save-alert);font-size:.76rem;margin-top:6px;min-height:14px;}
  .modal-box.wide{min-width:380px;}
  .search-results{max-height:280px;overflow-y:auto;margin-top:10px;border-top:1px solid var(--border);}
  .search-status{color:var(--fg-muted);font-size:.78rem;padding:10px 2px;}
  .search-result{padding:8px 2px;border-bottom:1px solid var(--border);cursor:pointer;}
  .search-result:hover{background:var(--border);}
  .sr-name{font-size:.82rem;color:var(--accent);}
  .sr-snippet{font-size:.74rem;color:var(--fg-muted);margin-top:2px;line-height:1.4;}
  .pinBtn{
    background:transparent;border:none;color:var(--fg-muted);cursor:pointer;
    font-size:.8rem;padding:0 2px;flex-shrink:0;
  }
  .pinBtn.pinned{color:var(--save-alert);}
  .modal-box label{display:block;margin:10px 0 4px;color:var(--fg-muted);font-size:.78rem;}
  .modal-box select, .modal-box input{
    width:100%;background:var(--bg-main);color:var(--fg-text);
    border:1px solid var(--border);border-radius:0;padding:6px 8px;font-size:.85rem;
  }
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .modal-actions button{
    background:transparent;border:1px solid var(--border);color:var(--fg-text);
    padding:6px 14px;border-radius:0;cursor:pointer;font-size:.8rem;
  }
  .modal-actions button:hover{background:var(--border);}
  .modal-actions button[data-modal-ok]{background:var(--accent);color:var(--bg-main);border-color:var(--accent);}
  .modal-actions button[data-modal-ok].modal-danger{background:var(--danger);border-color:var(--danger);color:#ffffff;}

  /* ---------- Fondo oscuro compartido para hojas de menú y panel en mobile ---------- */
  .mobileBackdrop{ display:none; }

  /* ====================================================================
     MOBILE (≤700px): menú compacto solo-icono, desplegables como hoja
     centrada (evita que se recorten al no depender de scroll horizontal),
     y panel de notas como overlay deslizante en vez de partir el ancho.
     ==================================================================== */
  @media (max-width:700px){
    body{ padding:0 6px 10px 6px; }

    /* Menú compacto: solo icono, sin texto debajo */
    .menu-btn, .saveBtn{ min-width:0; padding:8px 10px; gap:0; }
    .menu-btn svg, .saveBtn svg{ width:22px; height:22px; }
    .menu-label{ display:none; }
    .menubar-sep{ margin:6px 0; }

    /* Desplegables y submenús: hoja centrada en vez de anclada al botón,
       así nunca quedan cortados por el borde de una pantalla angosta */
    .menu-dropdown,
    .menu-dropdown.dd-right,
    .submenuwrap > .menu-dropdown.submenu{
      position:fixed; top:50%; left:50%; right:auto;
      transform:translate(-50%,-50%);
      width:88vw; max-width:340px; max-height:75vh; overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.6); z-index:75;
    }

    /* Fondo oscuro detrás de la hoja de menú abierta o del panel de notas */
    .mobileBackdrop{
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:65;
    }
    body.mobile-overlay-open .mobileBackdrop{ display:block; }

    /* Panel de notas: overlay deslizante en mobile, arranca visible */
    .notesPanel{
      position:fixed; top:0; left:0; height:100%;
      width:85vw; max-width:300px;
      z-index:70; box-shadow:6px 0 28px rgba(0,0,0,.5);
      transform:translateX(0); transition:transform .2s ease;
    }
    .notesPanel-inner{ width:100%; }

    /* Buscar/Reemplazar: permite que la fila pase a dos líneas en vez de desbordar */
    .findrow{ flex-wrap:wrap; }
    .findbar input{ flex:1 1 140px; }
    .findbar button{ padding:5px 8px; font-size:.72rem; }

    /* Modales: nunca más anchos que la pantalla */
    .modal-box{ min-width:0; width:92vw; max-width:360px; }
    .modal-box.wide{ min-width:0; width:92vw; max-width:360px; }

    /* Pestañas: un poco más angostas para que se vean más a la vez */
    .tabpill{ max-width:140px; }
  }
</style>

            <svg viewBox="0 0 24 24" width="14" height="14"><circle cx="10.5" cy="10.5" r="6.5" fill="#eef3fb" stroke="#2872c4" stroke-width="2"/><line x1="15.2" y1="15.2" x2="21" y2="21" stroke="#2872c4" stroke-width="2.4" stroke-linecap="round"/></svg>

        </div>
        <p>No tienes ninguna nota abierta.</p>

  </main>

  <div class="findbar hidden" id="findbar">
    <div class="findrow">
      <input type="text" id="findInput" placeholder="Buscar…">

<script>
(function(){
  const tabsbar = document.getElementById('tabsbar');
  const editorstack = document.getElementById('editorstack');
  const editorEmpty = document.getElementById('editorEmpty');
  const fileInput = document.getElementById('fileInput');
  const findbar = document.getElementById('findbar');
  const findInput = document.getElementById('findInput');
  const replaceInput = document.getElementById('replaceInput');
  const replaceRow = document.getElementById('replaceRow');
  const statusbar = document.getElementById('statusbar');
  const statusLeft = document.getElementById('statusLeft');
  const statusWords = document.getElementById('statusWords');
  const statusChars = document.getElementById('statusChars');
  // statusScheme reemplazado por botón toggle en el statusbar
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const notesPanel = document.getElementById('notesPanel');
  const notesPanelList = document.getElementById('notesPanelList');
  const recentSubmenu = document.getElementById('recentSubmenu');
  const fontMenuDropdown = document.getElementById('fontMenuDropdown');
  // schemeMenuDropdown eliminado — menú Color reemplazado por toggle en statusbar
  const modalOverlay = document.getElementById('modalOverlay');
  const modalBox = document.getElementById('modalBox');
  const quickSaveBtn = document.getElementById('quickSaveBtn');
  const toastEl = document.getElementById('toast');
  const toastMsgEl = document.getElementById('toastMsg');
  const toastUndoBtn = document.getElementById('toastUndoBtn');
  const reconnectBar = document.getElementById('reconnectBar');
  const reconnectBtn = document.getElementById('reconnectBtn');
  const reconnectDismiss = document.getElementById('reconnectDismiss');
  const connectBar = document.getElementById('connectBar');
  const connectBarBtn = document.getElementById('connectBarBtn');
  const notesPanelNewBtn = document.getElementById('notesPanelNewBtn');
  const notesPanelSearchBtn = document.getElementById('notesPanelSearchBtn');

  const TRASH_ICON_SVG = '<svg viewBox="0 0 24 24" width="15" height="15"><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" fill="none" stroke="#9aa3ad" stroke-width="1.4"></path><path d="M4 6h16l-1.2 14.2A2 2 0 0 1 16.8 22H7.2a2 2 0 0 1-2-1.8z" fill="#e5484d"></path><line x1="3" y1="6" x2="21" y2="6" stroke="#9aa3ad" stroke-width="1.6" stroke-linecap="round"></line><line x1="10" y1="10" x2="10" y2="17" stroke="#ffffff" stroke-width="1.1"></line><line x1="14" y1="10" x2="14" y2="17" stroke="#ffffff" stroke-width="1.1"></line></svg>';
  const DOC_ICON_SVG = '<svg class="mi-icon" viewBox="0 0 24 24"><path d="M6 2h8l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z" fill="#ffffff" stroke="#2872c4" stroke-width="1.4"/><path d="M14 2v4h4" fill="none" stroke="#2872c4" stroke-width="1.4" stroke-linejoin="round"/><line x1="8" y1="12" x2="16" y2="12" stroke="#9aa3ad" stroke-width="1.3"/><line x1="8" y1="15" x2="16" y2="15" stroke="#9aa3ad" stroke-width="1.3"/></svg>';

  const supportsFSAccess = 'showOpenFilePicker' in window;
  const THEMES = [
    ['github-light','GitHub Light'],
    ['github-dark','GitHub Dark']
  ];
  const THEME_SWATCH = {
    'github-light': ['#ffffff', '#0969da'],
    'github-dark':  ['#0d1117', '#2f81f7']
  };

  let tabs = [];        // {id, name, handle, ta, originalContent}
  let activeTabId = null;
  let tabCounter = 0;
  let recentFiles = []; // {name, handle}  (solo en memoria de la sesión)
  let saveDirHandle = null;   // FileSystemDirectoryHandle fija para guardar sin diálogo
  let pendingDirHandle = null; // handle recuperado de IndexedDB que aún necesita permiso
  let toastTimer = null;

  // ============ Aviso flotante (toast) ============
  function showToast(msg, undoFn){
    toastMsgEl.textContent = msg;
    if(undoFn){
      toastUndoBtn.classList.remove('hidden');
      toastUndoBtn.onclick = function(){ clearTimeout(toastTimer); toastEl.classList.remove('show'); undoFn(); };
    } else {
      toastUndoBtn.classList.add('hidden');
      toastUndoBtn.onclick = null;
    }
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), undoFn ? 6000 : 2400);
  }

  // ============ IndexedDB: recordar la carpeta de guardado entre sesiones ============
  function idbOpen(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('editorium-db', 1);
      req.onupgradeneeded = () => { req.result.createObjectStore('settings'); };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbSet(key, value){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('settings', 'readwrite');
      tx.objectStore('settings').put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGet(key){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('settings', 'readonly');
      const req = tx.objectStore('settings').get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  // Persiste la lista de "Recientes" entre sesiones (los FileSystemFileHandle
  // se pueden guardar directamente en IndexedDB).
  async function persistRecent(){
    try{ await idbSet('recentFiles', recentFiles); }catch(e){ /* IndexedDB no disponible, queda solo en memoria */ }
  }
  async function restoreRecentFiles(){
    try{
      const stored = await idbGet('recentFiles');
      if(!Array.isArray(stored)) return;
      const valid = [];
      for(const r of stored){
        try{
          const perm = await r.handle.queryPermission({ mode: 'readwrite' });
          if(perm === 'granted') valid.push(r);
        }catch(e){ /* handle inválido o ya no accesible: se descarta */ }
      }
      recentFiles = valid;
      buildRecentMenu();
    }catch(e){ /* sin datos guardados, o IndexedDB no disponible */ }
  }

  // Recuerda qué notas (de la carpeta fija) estaban abiertas, para poder
  // reabrirlas automáticamente la próxima vez que se conecte esa carpeta.
  async function persistOpenTabs(){
    try{
      const names = tabs.filter(t => t.handle).map(t => t.name);
      await idbSet('openTabNames', names);
    }catch(e){ /* IndexedDB no disponible */ }
  }
  async function reopenPreviousTabs(){
    if(!saveDirHandle) return;
    try{
      const names = await idbGet('openTabNames');
      if(!Array.isArray(names) || names.length === 0) return;
      for(const name of names){
        if(tabs.some(t => t.name === name)) continue; // ya está abierta
        try{
          const handle = await saveDirHandle.getFileHandle(name);
          const file = await handle.getFile();
          const text = await file.text();
          createTab({ name, content: text, handle, makeActive: false });
        }catch(e){ /* la nota pudo borrarse o renombrarse mientras tanto */ }
      }
      if(tabs.length > 0 && !activeTabId) activateTab(tabs[0].id);
    }catch(e){ /* sin datos guardadas */ }
  }

  async function syncLocationWarning(){
    const el = document.getElementById('locationWarning');
    const t = activeTab();
    if(!saveDirHandle || !t || !t.handle){ el.textContent = ''; return; }
    try{
      const rel = await saveDirHandle.resolve(t.handle);
      el.textContent = (rel === null) ? '⚠ Esta nota está fuera de "' + saveDirHandle.name + '"' : '';
    }catch(e){ el.textContent = ''; }
  }

  function isLocked(){ return supportsFSAccess && !saveDirHandle; }

  function applyEditingLock(){
    const locked = isLocked();
    tabs.forEach(function(t){
      t.ta.readOnly = locked;
      t.ta.placeholder = locked
        ? 'Conecta una carpeta de guardado (Archivo → Carpeta de guardado…) para empezar a escribir.'
        : 'Escribe tu nota aquí… (soporta Markdown)';
    });
    connectBar.classList.toggle('show', locked && !pendingDirHandle);
  }

  function syncFolderStatus(){
    const el = document.getElementById('folderStatus');
    if(!supportsFSAccess){
      el.textContent = 'Carpeta fija no disponible (usa Chrome/Edge)';
      el.className = 'none';
      el.title = 'Este navegador no soporta elegir una carpeta fija de guardado.';
      el.onclick = null;
      applyEditingLock();
      return;
    }
    if(saveDirHandle){
      el.textContent = 'Carpeta: ' + saveDirHandle.name + ' ✓';
      el.className = 'active';
      el.title = 'Guardar usa la carpeta "' + saveDirHandle.name + '" automáticamente, sin preguntar.';
      el.onclick = null;
    } else if(pendingDirHandle){
      el.textContent = 'Carpeta: ' + pendingDirHandle.name + ' (reconectar)';
      el.className = 'pending';
      el.title = 'Haz clic para reconectar la carpeta "' + pendingDirHandle.name + '".';
      el.onclick = () => reconnectBtn.click();
    } else {
      el.textContent = 'Sin carpeta fija';
      el.className = 'none';
      el.title = 'Archivo → Carpeta de guardado… para configurar una.';
      el.onclick = null;
    }
    applyEditingLock();
  }

  async function chooseSaveFolder(){
    if(!supportsFSAccess){
      await alertModal('Tu navegador no permite fijar una carpeta de guardado. Usa Chrome o Edge para esta función.');
      return;
    }
    try{
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      saveDirHandle = handle;
      reconnectBar.classList.remove('show');
      try{ await idbSet('saveDirHandle', handle); }catch(e){ /* IndexedDB no disponible, seguimos solo en memoria */ }
      showToast('Carpeta "' + handle.name + '" configurada ✓');
      syncFolderStatus();
      syncLocationWarning();
      if(notesPanelOpen) refreshNotesPanel();
      reopenPreviousTabs();
    }catch(e){ /* el usuario canceló el selector */ }
  }

  async function restoreSaveFolder(){
    try{
      const handle = await idbGet('saveDirHandle');
      if(!handle){ syncFolderStatus(); return; }
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if(perm === 'granted'){
        saveDirHandle = handle;
      } else {
        pendingDirHandle = handle;
        document.getElementById('reconnectText').textContent =
          'La carpeta "' + handle.name + '" necesita confirmarse de nuevo en esta sesión.';
        reconnectBar.classList.add('show');
      }
    }catch(e){ /* sin IndexedDB, o el handle ya no es válido: seguimos sin carpeta fija */ }
    syncFolderStatus();
    syncLocationWarning();
    reopenPreviousTabs();
  }
  reconnectBtn.addEventListener('click', async function(){
    if(!pendingDirHandle) return;
    try{
      const perm = await pendingDirHandle.requestPermission({ mode: 'readwrite' });
      if(perm === 'granted'){
        saveDirHandle = pendingDirHandle;
        reconnectBar.classList.remove('show');
        showToast('Carpeta "' + saveDirHandle.name + '" reconectada ✓');
        syncFolderStatus();
        syncLocationWarning();
        if(notesPanelOpen) refreshNotesPanel();
        reopenPreviousTabs();
      }
    }catch(e){ /* el usuario negó el permiso */ }
  });
  reconnectDismiss.addEventListener('click', () => reconnectBar.classList.remove('show'));
  connectBarBtn.addEventListener('click', chooseSaveFolder);

  // ============ Panel de todas mis notas ============
  const notesPanelOpen = true; // panel siempre fijo y visible
  let notesSortMode = 'date'; // 'date' (más reciente primero) o 'alpha' (A-Z)
  const notesPanelSortRow = document.getElementById('notesPanelSortRow');

  notesPanelNewBtn.addEventListener('click', newTab);
  notesPanelSearchBtn.addEventListener('click', searchAllNotes);
  notesPanelSortRow.addEventListener('click', function(e){
    const btn = e.target.closest('[data-sort]');
    if(!btn) return;
    notesSortMode = btn.getAttribute('data-sort');
    notesPanelSortRow.querySelectorAll('.notesPanel-sortBtn').forEach(b => b.classList.toggle('active', b === btn));
    refreshNotesPanel();
  });

  function formatLastEdited(ts){
    if(!ts) return 'Última edición: —';
    const now = new Date();
    const d = new Date(ts);
    const hhmm = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const dMidnight   = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((todayMidnight - dMidnight) / 86400000);
    let when;
    if(diffDays === 0)      when = 'Hoy, ' + hhmm;
    else if(diffDays === 1) when = 'Ayer';
    else if(diffDays < 7)  when = 'Hace ' + diffDays + ' días';
    else {
      const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      when = d.getDate() + ' ' + MESES[d.getMonth()];
      if(d.getFullYear() !== now.getFullYear()) when += ' ' + d.getFullYear();
    }
    return 'Última edición: ' + when;
  }

  async function refreshNotesPanel(){
    if(!saveDirHandle){
      notesPanelList.innerHTML =
        '<div class="notesPanel-empty">Configura una carpeta de guardado para ver aquí todas tus notas.' +
        '<button type="button" id="notesPanelConfigBtn">Elegir carpeta…</button></div>';
      const btn = document.getElementById('notesPanelConfigBtn');
      if(btn) btn.addEventListener('click', chooseSaveFolder);
      return;
    }
    notesPanelList.innerHTML = '<div class="notesPanel-empty">Cargando…</div>';
    const items = [];
    try{
      for await (const [name, handle] of saveDirHandle.entries()){
        if(handle.kind !== 'file' || !/\.(txt|md|markdown)$/i.test(name)) continue;
        let lastModified = 0;
        try{ const file = await handle.getFile(); lastModified = file.lastModified; }catch(e){ /* sin permiso para leerlo todavía */ }
        items.push({ name, handle, lastModified });
      }
    }catch(e){ /* la carpeta pudo cambiar de permisos */ }
    if(notesSortMode === 'alpha'){
      items.sort((a, b) => a.name.localeCompare(b.name, 'es'));
    } else {
      items.sort((a, b) => b.lastModified - a.lastModified);
    }
    if(items.length === 0){
      notesPanelList.innerHTML = '<div class="notesPanel-empty">Esta carpeta todavía no tiene notas guardadas.</div>';
      return;
    }
    notesPanelList.innerHTML = '';
    items.forEach(function(item){
      const isActive = tabs.some(t => t.id === activeTabId && t.name === item.name && t.handle);
      const card = document.createElement('div');
      card.className = 'notesPanel-card' + (isActive ? ' active' : '');
      card.title = item.name;
      card.innerHTML =
        '<div class="notesPanel-cardTop">' +
          '<span class="notesPanel-cardTitle">' + escapeHtml(item.name) + '</span>' +
          '<button type="button" class="notesPanel-trashBtn" title="Eliminar nota" aria-label="Eliminar nota">' + TRASH_ICON_SVG + '</button>' +
        '</div>' +
        '<div class="notesPanel-cardSub">' + formatLastEdited(item.lastModified) + '</div>';
      card.addEventListener('click', async function(){
        const existing = tabs.find(t => t.name === item.name && t.handle);
        if(existing){ activateTab(existing.id); return; }
        try{
          const file = await item.handle.getFile();
          const text = await file.text();
          createTab({ name: item.name, content: text, handle: item.handle });
        }catch(e){ await alertModal('No se pudo abrir el archivo.'); }
      });
      card.querySelector('.notesPanel-trashBtn').addEventListener('click', function(e){
        e.stopPropagation();
        deleteNote(item);
      });
      notesPanelList.appendChild(card);
    });
  }

  // Renombra una nota de verdad: crea el archivo con el nuevo nombre, copia
  // el contenido, y borra el original — a diferencia de "Guardar como", que
  // a propósito deja intacto el archivo original (igual que Word).
  function renameNote(item){
    openModal(
      '<h3>Renombrar nota</h3><label>Nuevo nombre</label>' +
      '<input type="text" id="renameInput" value="' + item.name.replace(/"/g,'&quot;') + '">' +
      '<div class="modal-error" id="renameError"></div>' +
      '<div class="modal-actions"><button data-modal-cancel>Cancelar</button><button data-modal-ok>Renombrar</button></div>',
      async function(){
        let newName = document.getElementById('renameInput').value.trim();
        if(isGenericName(newName)){
          document.getElementById('renameError').textContent = 'Escribe un nombre específico — "nota" no vale.';
          return false;
        }
        if(!/\.[a-zA-Z0-9]+$/.test(newName)) newName += '.txt';
        if(newName === item.name) return true;
        let exists = false;
        try{ await saveDirHandle.getFileHandle(newName); exists = true; }catch(e){ exists = false; }
        if(exists){
          document.getElementById('renameError').textContent = 'Ya existe una nota con este nombre.';
          return false;
        }
        try{
          const file = await item.handle.getFile();
          const text = await file.text();
          const newHandle = await saveDirHandle.getFileHandle(newName, { create: true });
          const writable = await newHandle.createWritable();
          await writable.write(text);
          await writable.close();
          await saveDirHandle.removeEntry(item.name);
          const openTab = tabs.find(t => t.name === item.name && t.handle);
          if(openTab){ openTab.handle = newHandle; openTab.name = newName; buildTabsBar(); persistOpenTabs(); }
          recentFiles = recentFiles.filter(r => r.name !== item.name);
          persistRecent();
          showToast('Nota renombrada ✓');
          refreshNotesPanel();
          return true;
        }catch(err){
          document.getElementById('renameError').textContent = 'No se pudo renombrar: ' + err.message;
          return false;
        }
      }
    );
  }

  // Borra una nota de la carpeta fija (y cierra su pestaña si estaba abierta).
  // El borrado da una ventana de unos segundos para deshacerlo desde el toast,
  // ya que el sistema de archivos no tiene una papelera a la que recurrir.
  async function deleteNote(item){
    const ok = await confirmModal(
      '¿Eliminar "' + item.name + '"? Podrás deshacerlo durante unos segundos justo después.',
      { title: 'Eliminar nota', confirmLabel: 'Eliminar', danger: true }
    );
    if(!ok) return;
    let content = '';
    try{ const file = await item.handle.getFile(); content = await file.text(); }catch(e){ /* si no se puede leer, igual se intenta borrar */ }
    try{
      await saveDirHandle.removeEntry(item.name);
      const openTab = tabs.find(t => t.name === item.name && t.handle);
      if(openTab) closeTab(openTab.id, true);
      recentFiles = recentFiles.filter(r => r.name !== item.name);
      persistRecent();
      refreshNotesPanel();
      const noteName = item.name;
      showToast('Nota eliminada', async function(){
        try{
          const handle = await saveDirHandle.getFileHandle(noteName, { create: true });
          const writable = await handle.createWritable();
          await writable.write(content);
          await writable.close();
          showToast('Nota restaurada ✓');
          refreshNotesPanel();
        }catch(e){ showToast('No se pudo restaurar la nota'); }
      });
    }catch(err){
      showToast('Error al eliminar');
      await alertModal('No se pudo eliminar la nota: ' + err.message);
    }
  }

  // ============ Buscar en todas las notas (carpeta fija) ============
  function searchAllNotes(){
    if(!saveDirHandle){
      alertModal('Primero configura una carpeta de guardado fija en Archivo → Carpeta de guardado…, para poder buscar en todas tus notas.');
      return;
    }
    openModal(
      '<h3>Buscar en todas las notas</h3>' +
      '<input type="text" id="globalSearchInput" placeholder="Escribe para buscar…">' +
      '<div class="search-results" id="globalSearchResults"></div>' +
      '<div class="modal-actions"><button data-modal-cancel>Cerrar</button></div>',
      () => false
    );
    modalBox.classList.add('wide');
    const input = document.getElementById('globalSearchInput');
    const results = document.getElementById('globalSearchResults');
    let debounceTimer = null;
    input.addEventListener('input', function(){
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => runGlobalSearch(input.value, results), 250);
    });
  }

  async function runGlobalSearch(term, resultsEl){
    term = term.trim();
    if(!term){ resultsEl.innerHTML = ''; return; }
    resultsEl.innerHTML = '<div class="search-status">Buscando…</div>';
    const tl = term.toLowerCase();
    const matches = [];
    try{
      for await (const [name, handle] of saveDirHandle.entries()){
        if(handle.kind !== 'file' || !/\.(txt|md|markdown)$/i.test(name)) continue;
        let text = '';
        try{ const file = await handle.getFile(); text = await file.text(); }
        catch(e){ continue; }
        const lower = text.toLowerCase();
        if(name.toLowerCase().includes(tl) || lower.includes(tl)){
          let snippet = '';
          const idx = lower.indexOf(tl);
          if(idx !== -1){
            const start = Math.max(0, idx - 40);
            snippet = (start > 0 ? '…' : '') + text.substring(start, idx + tl.length + 40).replace(/\s+/g, ' ') + '…';
          }
          matches.push({ name, handle, snippet });
        }
      }
    }catch(e){ /* la carpeta pudo cambiar de permisos entre tanto */ }

    if(matches.length === 0){
      resultsEl.innerHTML = '<div class="search-status">Sin resultados.</div>';
      return;
    }
    resultsEl.innerHTML = '';
    matches.forEach(function(m){
      const item = document.createElement('div');
      item.className = 'search-result';
      item.innerHTML = '<div class="sr-name">' + escapeHtml(m.name) + '</div>' +
                        (m.snippet ? '<div class="sr-snippet">' + escapeHtml(m.snippet) + '</div>' : '');
      item.addEventListener('click', async function(){
        const existing = tabs.find(t => t.name === m.name && t.handle);
        if(existing){ activateTab(existing.id); closeModal(); return; }
        try{
          const file = await m.handle.getFile();
          const text = await file.text();
          createTab({ name: m.name, content: text, handle: m.handle });
          closeModal();
        }catch(e){ await alertModal('No se pudo abrir el archivo.'); }
      });
      resultsEl.appendChild(item);
    });
  }

  // ============ utilidades de pestañas ============
  function activeTab(){ return tabs.find(t => t.id === activeTabId); }
  function activeTextarea(){ const t = activeTab(); return t ? t.ta : null; }
  function isDirty(tab){ return tab.ta.value !== tab.originalContent; }

  function buildTabsBar(){
    tabsbar.innerHTML = '';
    const sorted = [...tabs].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
    sorted.forEach(t => {
      const pill = document.createElement('div');
      pill.className = 'tabpill' + (t.id === activeTabId ? ' active' : '');
      pill.innerHTML =
        '<button class="pinBtn' + (t.pinned ? ' pinned' : '') + '" title="' + (t.pinned ? 'Quitar de fijados' : 'Fijar nota') + '" aria-label="' + (t.pinned ? 'Quitar de fijados' : 'Fijar nota') + '">' +
          (t.pinned ? '★' : '☆') +
        '</button>' +
        '<span class="ficon"></span>' +
        '<span class="tname">' + escapeHtml(t.name) + '</span>' +
        (isDirty(t) ? '<span class="dirty">●</span>' : '') +
        '<button class="tclose" title="Cerrar" aria-label="Cerrar pestaña">✕</button>';
      pill.addEventListener('click', () => activateTab(t.id));
      pill.querySelector('.pinBtn').addEventListener('click', (e) => {
        e.stopPropagation(); t.pinned = !t.pinned; buildTabsBar();
      });
      pill.querySelector('.tname').title = 'Doble clic para guardar con otro nombre';
      pill.querySelector('.tname').addEventListener('dblclick', (e) => {
        e.stopPropagation(); saveTabAs(t);
      });
      pill.querySelector('.tclose').addEventListener('click', (e) => {
        e.stopPropagation(); closeTab(t.id);
      });
      tabsbar.appendChild(pill);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tabAdd'; addBtn.textContent = '+'; addBtn.title = 'Nueva pestaña'; addBtn.setAttribute('aria-label', 'Nueva pestaña');
    addBtn.addEventListener('click', () => newTab());
    tabsbar.appendChild(addBtn);
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function createTab(opts){
    opts = opts || {};
    const id = 'tab' + (++tabCounter);

    // ── Wrapper que agrupa toolbar + editor + preview ──────────────────
    const wrapper = document.createElement('div');
    wrapper.className = 'tab-wrapper';
    wrapper.dataset.tabId = id;

    // ── Textarea ───────────────────────────────────────────────────────
    const ta = document.createElement('textarea');
    ta.className = 'editor active';
    ta.spellcheck = true;
    ta.lang = 'es';
    ta.readOnly = isLocked();
    ta.placeholder = isLocked()
      ? 'Conecta una carpeta de guardado (Archivo → Carpeta de guardado…) para empezar a escribir.'
      : 'Escribe tu nota aquí… (soporta Markdown)';
    ta.value = opts.content || '';
    wrapper.appendChild(ta);

    // ── Preview pane ──────────────────────────────────────────────────
    const preview = document.createElement('div');
    preview.className = 'preview-pane';
    wrapper.appendChild(preview);

    editorstack.appendChild(wrapper);

    const tab = {
      id, name: opts.name || 'sin-título.txt', handle: opts.handle || null,
      ta, preview, wrapper, originalContent: opts.content || '',
      pinned: false, previewMode: false
    };
    tabs.push(tab);

    attachEditorEvents(ta);
    wrapper.classList.remove('active');
    if(opts.makeActive !== false) activateTab(id);
    else buildTabsBar();
    if(tab.handle) persistOpenTabs();
    return tab;
  }

  function activateTab(id){
    activeTabId = id;
    tabs.forEach(t => {
      t.wrapper.classList.toggle('active', t.id === id);
      t.ta.classList.toggle('active', t.id === id && !t.previewMode);
      t.preview.classList.toggle('active', t.id === id && t.previewMode);
    });
    buildTabsBar();
    refreshAll();
    syncLocationWarning();
    const t = activeTab();
    if(t && !t.previewMode) t.ta.focus();
  }

  async function closeTab(id, skipConfirm){
    const tab = tabs.find(t => t.id === id);
    if(!tab) return;
    if(!skipConfirm && isDirty(tab)){
      const ok = await confirmModal(
        '"' + tab.name + '" tiene cambios sin guardar. ¿Cerrar de todas formas?',
        { title: 'Cambios sin guardar', confirmLabel: 'Cerrar sin guardar', danger: true }
      );
      if(!ok) return;
    }
    const idx = tabs.indexOf(tab);
    tab.wrapper.remove();
    tabs.splice(idx, 1);
    if(tab.handle) persistOpenTabs();
    if(tabs.length === 0){
      activeTabId = null;
      refreshAll();
      return;
    }
    if(activeTabId === id){
      const next = tabs[idx] || tabs[idx - 1];
      activateTab(next.id);
    } else {
      buildTabsBar();
    }
  }

  const GENERIC_NAMES = ['nota','nota.txt','nota.md','sin-título','sin-titulo',
    'sin-título.txt','sin-titulo.txt','untitled','untitled.txt','documento','documento.txt'];
  function isGenericName(name){ return GENERIC_NAMES.includes(name.trim().toLowerCase()); }

  function newTab(){
    openModal(
      '<h3>Nuevo documento</h3><label>Nombre del archivo</label>' +
      '<input type="text" id="newNameInput" placeholder="ej: ideas-articulo-cuba.txt">' +
      '<div class="modal-error" id="newNameError"></div>' +
      '<div class="modal-actions"><button data-modal-cancel>Cancelar</button><button data-modal-ok>Crear</button></div>',
      async function(){
        let name = document.getElementById('newNameInput').value.trim();
        if(isGenericName(name)){
          document.getElementById('newNameError').textContent = 'Escribe un nombre específico para tu nota — "nota" no vale.';
          return false;
        }
        if(!/\.[a-zA-Z0-9]+$/.test(name)) name += '.txt';
        if(saveDirHandle){
          let exists = false;
          try{ await saveDirHandle.getFileHandle(name); exists = true; }catch(e){ exists = false; }
          if(exists){
            document.getElementById('newNameError').textContent = 'Ya existe una nota con este nombre.';
            return false;
          }
        }
        createTab({ name });
        return true;
      }
    );
  }
  function newWindow(){ window.open(location.href, '_blank'); }


  // ============ refresco de UI del editor ============
  function attachEditorEvents(ta){
    ta.addEventListener('input', refreshAll);
    ta.addEventListener('click', updateCursorStatus);
    ta.addEventListener('keyup', updateCursorStatus);
    ta.addEventListener('keydown', function(e){
      if(e.key === 'Tab'){
        if(isLocked()) return; // deja que el foco avance de forma normal mientras está bloqueado
        e.preventDefault();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.setRangeText('    ', start, end, 'end');
        refreshAll();
      }
    });
  }

  function updateCounts(){
    const ta = activeTextarea(); if(!ta) return;
    const text = ta.value;
    const trimmed = text.trim();
    const words = trimmed.length ? trimmed.split(/\s+/).length : 0;
    statusWords.textContent = words + (words === 1 ? ' palabra' : ' palabras');
    statusChars.textContent = text.length + (text.length === 1 ? ' carácter' : ' caracteres');
  }

  function updateCursorStatus(){
    const ta = activeTextarea(); if(!ta) return;
    const pos = ta.selectionStart, end = ta.selectionEnd;
    const before = ta.value.substring(0, pos);
    const lines = before.split('\n');
    const line = lines.length, col = lines[lines.length - 1].length + 1;
    let txt = 'Ln ' + line + ', Col ' + col;
    if(end > pos) txt += '  ·  ' + (end - pos) + ' seleccionados';
    statusLeft.textContent = txt;
  }

  function refreshAll(){
    updateCounts(); updateCursorStatus();
    buildTabsBar(); syncQuickSave();
    editorEmpty.classList.toggle('show', tabs.length === 0);
  }

  // ============ Archivo ============
  async function openFile(){
    if(supportsFSAccess){
      try{
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'Texto', accept: { 'text/plain': ['.txt', '.md', '.markdown'] } }]
        });
        const file = await handle.getFile();
        const text = await file.text();
        createTab({ name: file.name, content: text, handle });
        addRecent(file.name, handle);
      }catch(err){ /* cancelado */ }
    } else {
      fileInput.click();
    }
  }
  fileInput.addEventListener('change', async function(){
    const file = fileInput.files[0]; if(!file) return;
    const text = await file.text();
    createTab({ name: file.name, content: text });
    fileInput.value = '';
  });

  function addRecent(name, handle){
    recentFiles = recentFiles.filter(r => r.name !== name);
    recentFiles.unshift({ name, handle });
    if(recentFiles.length > 8) recentFiles.pop();
    persistRecent();
  }

  async function saveTab(tab){
    if(!tab) return;
    if(tab.handle){
      showToast('Guardando…');
      try{
        const writable = await tab.handle.createWritable();
        await writable.write(tab.ta.value);
        await writable.close();
        tab.originalContent = tab.ta.value;
        refreshAll();
        showToast('Guardado ✓');
        syncLocationWarning();
      }catch(err){ showToast('Error al guardar'); await alertModal('No se pudo guardar: ' + err.message); }
      return;
    }
    // Primer guardado de esta pestaña. Si el nombre sigue siendo genérico
    // no lo dejamos pasar: paramos aquí y exigimos un nombre real antes de
    // escribir nada en disco.
    if(isGenericName(tab.name)){
      forceNameThenSave(tab);
      return;
    }
    // Si hay carpeta fija, usamos el nombre que ya se le dio (o el que se
    // acaba de exigir arriba). Si ya existe una nota con ese nombre en la
    // carpeta, NUNCA se sobrescribe ni se renombra solo: se exige un nombre
    // distinto antes de guardar nada.
    if(saveDirHandle){
      const result = await saveIntoFolder(tab, tab.name);
      if(result === 'duplicate'){
        forceNameThenSave(tab, 'Ya existe una nota con este nombre.');
      }
      return;
    }
    await promptSaveAs(tab);
  }

  // Pide un nombre real antes de continuar con el primer guardado de una
  // pestaña que todavía tiene un nombre genérico (típicamente una pestaña
  // recién creada), o para reintentar tras chocar con un nombre ya existente.
  function forceNameThenSave(tab, initialError){
    const prefill = isGenericName(tab.name) ? '' : tab.name.replace(/"/g,'&quot;');
    openModal(
      '<h3>Nombra tu nota antes de guardar</h3><label>Nombre del archivo</label>' +
      '<input type="text" id="forceNameInput" placeholder="ej: ideas-articulo-cuba.txt" value="' + prefill + '">' +
      '<div class="modal-error" id="forceNameError">' + (initialError || '') + '</div>' +
      '<div class="modal-actions"><button data-modal-cancel>Cancelar</button><button data-modal-ok>Guardar</button></div>',
      async function(){
        let name = document.getElementById('forceNameInput').value.trim();
        if(isGenericName(name)){
          document.getElementById('forceNameError').textContent = 'Escribe un nombre específico — "nota" no vale.';
          return false;
        }
        if(!/\.[a-zA-Z0-9]+$/.test(name)) name += '.txt';
        if(saveDirHandle){
          const result = await saveIntoFolder(tab, name);
          if(result === 'duplicate'){
            document.getElementById('forceNameError').textContent = 'Ya existe una nota con este nombre.';
            return false;
          }
          return true;
        } else {
          tab.name = name;
          promptSaveAs(tab);
          return true;
        }
      }
    );
  }

  // "Guardar como" SIEMPRE pregunta el nombre — para eso existe — sea o no
  // la primera vez que se guarda este documento. Si el nombre elegido ya
  // existe en la carpeta, se bloquea con un error y nunca se sobrescribe.
  async function saveTabAs(tab){
    if(!tab) return;
    if(saveDirHandle){
      openModal(
        '<h3>Guardar como</h3><label>Nombre del archivo</label>' +
        '<input type="text" id="saveAsNameInput" value="' + tab.name.replace(/"/g,'&quot;') + '">' +
        '<div class="modal-error" id="saveAsNameError"></div>' +
        '<div class="modal-actions"><button data-modal-cancel>Cancelar</button><button data-modal-ok>Guardar</button></div>',
        async function(){
          let newName = document.getElementById('saveAsNameInput').value.trim();
          if(isGenericName(newName)){
            document.getElementById('saveAsNameError').textContent = 'Escribe un nombre específico — "nota" no vale.';
            return false;
          }
          if(!/\.[a-zA-Z0-9]+$/.test(newName)) newName += '.txt';
          const result = await saveIntoFolder(tab, newName);
          if(result === 'duplicate'){
            document.getElementById('saveAsNameError').textContent = 'Ya existe una nota con este nombre.';
            return false;
          }
          return true;
        }
      );
      return;
    }
    await promptSaveAs(tab);
  }

  // Guarda dentro de la carpeta fija configurada, bajo el nombre indicado.
  // Si el nombre ya está en uso por OTRO archivo, nunca sobrescribe ni
  // renombra solo: devuelve 'duplicate' para que quien llamó pida otro nombre.
  async function saveIntoFolder(tab, name){
    try{
      // ¿Esto apunta a un archivo distinto al que esta pestaña ya tenía
      // asociado? — es decir, primer guardado con este nombre, o un nombre
      // nuevo vía "Guardar como". Solo en ese caso hace falta comprobar
      // colisión; sobrescribir el propio archivo de la pestaña sí es válido.
      const isNewTarget = !tab.handle || tab.name !== name;
      if(isNewTarget){
        let exists = false;
        try{ await saveDirHandle.getFileHandle(name); exists = true; }
        catch(e){ exists = false; }
        if(exists) return 'duplicate';
      }
      const handle = await saveDirHandle.getFileHandle(name, { create: true });
      showToast('Guardando…');
      const writable = await handle.createWritable();
      await writable.write(tab.ta.value);
      await writable.close();
      tab.handle = handle;
      tab.name = name;
      tab.originalContent = tab.ta.value;
      addRecent(tab.name, handle);
      persistOpenTabs();
      refreshAll();
      showToast('Guardado ✓');
      syncLocationWarning();
      if(notesPanelOpen) refreshNotesPanel();
      return 'ok';
    }catch(err){
      showToast('Error al guardar');
      alertModal('No se pudo guardar en la carpeta configurada: ' + err.message);
      return 'error';
    }
  }

  // Sin carpeta fija configurada: usa el selector nativo del navegador (o
  // descarga el archivo si el navegador no soporta elegir carpeta).
  async function promptSaveAs(tab){
    if(supportsFSAccess){
      try{
        const handle = await window.showSaveFilePicker({
          suggestedName: tab.name,
          types: [
            { description: 'Texto plano', accept: { 'text/plain': ['.txt'] } },
            { description: 'Markdown', accept: { 'text/markdown': ['.md'] } }
          ]
        });
        showToast('Guardando…');
        const writable = await handle.createWritable();
        await writable.write(tab.ta.value);
        await writable.close();
        tab.handle = handle;
        const file = await handle.getFile();
        tab.name = file.name;
        tab.originalContent = tab.ta.value;
        addRecent(tab.name, handle);
        refreshAll();
        showToast('Guardado ✓');
        syncLocationWarning();
      }catch(err){ /* cancelado */ }
    } else {
      showToast('Guardando…');
      const blob = new Blob([tab.ta.value], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = tab.name || 'nota.txt';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      tab.originalContent = tab.ta.value;
      refreshAll();
      showToast('Descargado a tu carpeta de Descargas ✓');
    }
  }

  async function saveAllTabs(){
    for(const tab of tabs){ if(isDirty(tab)) await saveTab(tab); }
  }

  function printActive(){
    const tab = activeTab(); const ta = activeTextarea(); if(!ta || !tab) return;
    const w = window.open('', '_blank');
    if(!w) return; // el navegador pudo bloquear la ventana emergente

    w.document.write(

      '@page{ margin: 2cm; }' +

      '.print-header{ border-bottom:1px solid #ccc; padding-bottom:10px; margin-bottom:26px; }' +
      '.print-title{ font-size:17px; font-weight:700; margin:0 0 3px; }' +
